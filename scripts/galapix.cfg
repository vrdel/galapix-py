[DEFAULT]
galapdir = /home/daniel/.galapix
pixsock = /home/daniel/.galapix/pixsock
notes = /home/daniel/my_notes
backend = py
pyenv_env = galapix-py
sort = mtime-reverse
background = 4b5262
selection_border = B02A37
spacing = 3

[DirMyWhiteboard]
dirpath = %(notes)s/my-whiteboard
dbpath = %(galapdir)s/mywhiteboard
wintitle = my_whiteboard
geometry = 1900x1000
pattern = argo|english|ansible|srce
changes_track = false
